volume: 600
holdout_frac: 0.15
teacher_model: "openai/gpt-4o"  # stronger teacher — gpt-4o-mini collapsed followup/none to one template
# Robustness mass; lower-case bumped for the ASR/voice-transcript serving register.
perturbations: { lower: 0.12, upper: 0.04, flat: 0.04, ocr: 0.02 }
