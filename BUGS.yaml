# Bug Tracker — Captured via /log-bug, fixed via /fix-bug.
# Severity: critical > high > medium > low
# Status: open > investigating > fix_in_progress > resolved > wont_fix

bugs:
  - id: "BUG-001"
    severity: high
    component: "lib/generation/generator.py"
    status: resolved
    reported_in: "2026-03-06"
    resolved_in: "2026-03-06"
    title: "Question triggers silently fail — extraction confidence too low"
    repro: "Ask questions about docs content; only TOPIC results appear, no QUESTION answers"
    fix: "Fall through to direct generation when extraction fails instead of returning canned [no match] message"

  - id: "BUG-002"
    severity: medium
    component: "src/api/transcript_buffer.py, src/api/session.py"
    status: resolved
    reported_in: "2026-03-06"
    resolved_in: "2026-03-06"
    title: "Transcripts display as raw chunks instead of discrete sentences"
    repro: "Speak full sentences — each audio chunk shows as separate block"
    root_cause: "Initial gap-based turn detection used wall-clock timestamps between add_chunk calls, but ASR chunks arrive ~3.5s apart even during continuous speech (pipeline cadence artifact, not a real pause)"
    fix: "Silence-based turn boundaries: TranscriptBuffer no longer uses time gaps between chunks. Turn finalization is driven by on_silence() events from audio capture layer. Audio-level silence is wired from audio capture through session to TranscriptBuffer. The _silence_seen flag bridges silence events to the next add_chunk call."

  - id: "BUG-003"
    severity: medium
    component: "src/api/routes/session.py"
    status: resolved
    reported_in: "2026-03-06"
    resolved_in: "2026-03-06"
    title: "Export notes returns empty content after session stop"
    repro: "Record meeting, stop, click Export Notes — shows 'No transcript recorded'"
    fix: "Keep session alive after stop so transcript data is available for export; fresh session created on next start"

  - id: "BUG-004"
    severity: high
    component: "lib/system_audio_capture.py, tools/audio-tap/Sources/AudioTap.swift"
    status: open
    reported_in: "2026-07-21"
    title: "Google Chrome crashes when selected as the per-app audio capture target"
    repro: "MeetingSetup → Meeting App = Google Chrome (PID) → Start Meeting; Chrome crashed during the session (session-017 live smoke)"
    notes: >
      Cause UNCONFIRMED — do not assume OOM. Evidence checked: no macOS
      jetsam/memorystatus kill in the 11:15–11:45 window, no Chrome Crashpad
      report for that day (newest was June 14), and memory was not exhausted.
      Session ran mic-only (see BUG-005, permission denied) for ~23 min.
      Prime suspect: the ScreenCaptureKit audio-tap attaching to Chrome's own
      PID destabilizing that app — NOT general memory pressure. Not yet
      reproduced in a controlled test.
    next: "Controlled repro — grant audio-tap Screen Recording perm, then capture a NON-Chrome target (or BlackHole) while watching memory + Console for Chrome's termination. If stable off-target, isolates 'capturing Chrome' as the trigger; then inspect the audio-tap Swift SCStream setup."

  - id: "BUG-005"
    severity: high
    component: "lib/system_audio_capture.py, src/api/session.py, app/src/components/MeetingSetup.tsx"
    status: open
    reported_in: "2026-07-21"
    title: "Per-app capture with denied Screen Recording silently runs mic-only (transcript shows one speaker)"
    repro: "Skip/deny Screen Recording permission for the audio-tap binary, select per-app capture, Start Meeting. Session runs ~23 min mic-only; transcript shows only 'You' (one speaker); no error surfaced to the user."
    root_cause: "system_audio_capture logs 'Screen Recording permission denied for audio-tap' but the session proceeds with mic-only. The MeetingSetup amber warning is passive/non-blocking, so the user believes dual-stream is active while the 'Others' side never captures."
    fix: "Hard-block (or explicit, dismissible-with-consequences error) when per-app capture is selected but Screen Recording permission is unavailable — surface a clear, actionable message + deep-link to the permission pane, and do not start a session under a false dual-stream expectation. Optionally offer a 'continue mic-only' explicit choice."
