# meeting-prompter — Feature Pipeline
# Organized by workstream. Priority: V1 > V1.5 > V2 > V3
# Status: backlog | planned | in_progress | done
# Effort: S (hours) | M (1-2 days) | L (3-5 days) | XL (1+ week)

workstreams:

  # ─── WORKSTREAM 1: Core Meeting Experience ───────────────────────
  # Priority: V1 — this is the product. Nail transcription, notes,
  # speaker detection, and summarization before anything else.

  core_meeting:
    name: "Core Meeting Experience"
    phase: V1
    description: >
      The foundational loop: capture audio → transcribe → attribute speakers →
      build turns → generate notes → export. Must feel polished and trustworthy
      before prompting or diarization matter.

    features:
      - id: F-101
        name: "Speaker-attributed meeting notes"
        status: done
        effort: M
        description: >
          Notes generator groups output by speaker: "Your talking points" vs
          "What others said". Action items extracted per-speaker. Summary
          includes who said what, not just what was said.
        depends_on: []
        files:
          - src/api/notes_generator.py
          - lib/generation/prompts.py

      - id: F-102
        name: "Full-metadata export (JSON + Markdown)"
        status: done
        effort: S
        description: >
          export_markdown() includes source field. New export_json() returns
          segments with all metadata (id, text, speaker, source, timestamps,
          is_final). API endpoint GET /transcript/export?format=json|md.
        depends_on: []
        files:
          - src/api/transcript_store.py
          - src/api/routes/transcript.py

      - id: F-103
        name: "Meeting setup flow polish"
        status: done
        effort: M
        description: >
          MeetingSetup dialog: select audio devices (mic + system), load
          meeting context YAML, set watch words, preview audio levels before
          starting. Currently bare-bones.
        depends_on: []
        files:
          - app/src/components/MeetingSetup.tsx
          - src/api/routes/session.py

      - id: F-104
        name: "Keyboard shortcuts and session controls"
        status: done
        effort: S
        description: >
          Pause/resume session, mark action item on current turn, toggle
          prompts pane visibility. Keyboard-driven workflow for power users.
        depends_on: []
        files:
          - app/src/App.tsx
          - app/src/components/StatusBar.tsx

      - id: F-105
        name: "Transcript quality: refiner tuning + turn boundary polish"
        status: backlog
        effort: M
        description: >
          Audit text refiner output quality on real meetings. Tune turn pause
          threshold (currently 2s) and max turn duration (30s) based on real
          conversation patterns. Ensure polished text doesn't lose meaning.
        depends_on: []
        files:
          - lib/text_refiner.py
          - src/api/transcript_buffer.py

      - id: F-106
        name: "Post-meeting summary generation"
        status: backlog
        effort: M
        description: >
          After session stop, generate a structured summary: key decisions,
          action items (with owners from speaker labels), topics discussed,
          open questions. Uses full transcript, not rolling 90s window.
        depends_on: [F-101]
        files:
          - src/api/notes_generator.py
          - app/src/components/NoteEditor.tsx

  # ─── WORKSTREAM 1B: RAG Pipeline Quality ────────────────────────
  # Priority: HIGHEST — this is the intelligence backbone.
  # 10-12 documents, must retrieve accurately and fast.

  rag_pipeline:
    name: "RAG Pipeline Quality"
    phase: V1
    description: >
      The RAG pipeline is the highest-leverage piece of the system. With
      10-12 source documents, retrieval quality directly determines whether
      prompts are useful or noise. Hybrid FTS5 + vector pipeline now in
      place — needs tuning and evaluation on real meeting workloads.

    features:
      - id: F-110
        name: "RAG retrieval quality audit + tuning"
        status: done
        effort: L
        description: >
          Replaced ColBERT with hybrid FTS5 + vector pipeline (all-MiniLM-L6-v2,
          80MB). Built eval harness (21 queries, 3 real docs): Hit@1=94.4%,
          Hit@3=100%, MRR=0.972. Fixed: FTS5 standalone schema, confidence
          calibration (raw cosine vs min-max), FTS5 OR queries with stop words,
          standalone delete triggers. Wired heuristic re-ranking. Tuned
          rag_confidence_minimum to 0.35 (above negative query max of 0.34).
        depends_on: []
        files:
          - lib/rag_engine.py
          - lib/rag/
          - config.yaml
          - tests/eval/

      - id: F-111
        name: "Section-aware chunking improvements"
        status: backlog
        effort: M
        description: >
          Current chunker splits on markdown headers with fixed token window.
          Audit chunk boundaries on real docs — are semantically complete
          sections staying together? Consider: hierarchical chunking (section
          + subsection context), better PDF section detection, metadata
          preservation (source file, section title) in chunk for better
          source attribution in prompts.
        depends_on: [F-110]
        files:
          - lib/rag/chunker/
          - lib/rag/parser/

      - id: F-112
        name: "Retrieval result ranking + dedup"
        status: backlog
        effort: M
        description: >
          When multiple chunks from the same document match, deduplicate
          and merge overlapping context. Rank by a combination of fused
          score + document freshness + section relevance. Ensure the
          generator sees the best 2-3 chunks, not 5 overlapping ones.
        depends_on: [F-110]
        files:
          - lib/rag/retrieval/
          - lib/rag/rank/
          - lib/rag_engine.py

      - id: F-113
        name: "Evaluate LFM2-1.2B-RAG for generation stage"
        status: backlog
        effort: M
        description: >
          Evaluate LiquidAI/LFM2-1.2B-RAG (HuggingFace) as replacement for
          LFM2.5-1.2B-Instruct in the generation stage. RAG-tuned on 1M+
          multi-document Q&A samples — may produce better grounded answers.
          Separate from retrieval pipeline (which uses all-MiniLM-L6-v2).
        depends_on: [F-110]
        files:
          - lib/generation/generator.py
          - lib/rag_generator.py

  # ─── WORKSTREAM 2: Prompting System Redesign ─────────────────────
  # Priority: TABLED — revisit after real usage informs what's needed.
  # Current system fires on syntax, not intent. Needs product rethink.

  prompting:
    name: "Prompting System Redesign"
    phase: V1
    description: >
      Replace trigger-type thinking with intervention-mode thinking.
      Current 4 categories (QUESTION, TOPIC, ALERT, FOLLOW_UP) are
      engineering categories. Users need: context surfacing, question
      enrichment, proactive nudges. Defer until core meeting experience
      informs what users actually need.

    features:
      - id: F-201
        name: "Rhetorical question detection"
        status: done
        effort: M
        description: >
          Three suppression layers: tag questions ("...right?", "...okay?"),
          self-answering ("Can we? Yeah."), rhetorical forms ("Don't we
          already...?"). Conservative patterns — "Do we need X?" stays
          genuine, "Do we really need X?" suppressed. 46 tests.
        depends_on: []
        files:
          - lib/triggers/question_trigger.py
          - tests/test_question_trigger.py

      - id: F-202
        name: "Kill dead-end responses"
        status: done
        effort: S
        description: >
          Never show "I don't have that information in my documents."
          Either surface something useful (related context, suggest a
          better question) or stay silent. Dead-ends destroy trust.
        depends_on: []
        files:
          - lib/generation/generator.py
          - lib/generation/prompts.py

      - id: F-203
        name: "Context surfacing mode"
        status: done
        effort: L
        description: >
          When discussion matches docs, surface a specific fact — not a
          paraphrase of what's being discussed. Current TOPIC trigger
          generates summaries of the conversation rather than adding new
          information from docs.
        depends_on: [F-202]
        files:
          - lib/triggers/topic_trigger.py
          - lib/generation/prompts.py

      - id: F-204
        name: "Question enrichment mode"
        status: backlog
        effort: L
        description: >
          When a real question is detected and docs have relevant context,
          answer it. When docs don't match, suggest a better-framed
          question based on what the docs do contain. Replace binary
          "answer or nothing" with a spectrum of helpfulness.
        depends_on: [F-201, F-202]
        files:
          - lib/triggers/question_trigger.py
          - lib/generation/generator.py
          - lib/generation/prompts.py

      - id: F-205
        name: "Proactive nudge mode"
        status: in_progress
        effort: L
        description: >
          Detect opportunity moments: decision points, contradictions with
          docs, gaps in discussion that docs could fill. "You might want
          to ask about X" or "The docs mention Y which is relevant here."
          Replaces current FOLLOW_UP trigger.
        depends_on: [F-203, F-204]
        files:
          - lib/triggers/followup_trigger.py
          - lib/triggers/engine.py

      - id: F-206
        name: "Prompt template rewrite for 1.2B model"
        status: done
        effort: M
        description: >
          Current prompts too verbose for LFM2.5-1.2B-Instruct. Shorter,
          more directive templates. Tone variation by intervention mode
          (factual for context, suggestive for nudges). Adaptive context
          budget (shrink RAG when low-confidence, grow conversation).
        depends_on: [F-203, F-204, F-205]
        files:
          - lib/generation/prompts.py

      - id: F-207
        name: "Evaluate all signals, not first-match"
        status: backlog
        effort: M
        description: >
          Current engine returns first trigger that fires. Redesign to
          evaluate all signals, score by relevance + confidence, and
          pick the highest-value intervention. May surface multiple
          interventions ranked by usefulness.
        depends_on: [F-203, F-204, F-205]
        files:
          - lib/triggers/engine.py

  # ─── WORKSTREAM 3: Speaker Attribution ───────────────────────────
  # Priority: V1.5+ — Tier 1 (You/Others) is done. Tier 2/3 are
  # enhancements that depend on packaging decisions.

  speaker_attribution:
    name: "Speaker Attribution (Tier 2+)"
    phase: V1.5
    description: >
      Tier 1 (dual-stream You/Others) is complete. Tier 2 adds neural
      diarization for multi-speaker on system audio. Tier 3 adds named
      speaker enrollment. Both require model delivery decisions.
      See context/speaker-attribution.md.

    features:
      - id: F-301
        name: "Tier 2: Neural diarization on system audio"
        status: done
        effort: XL
        description: >
          Add diart/pyannote for speaker clustering on the system audio
          stream. Distinguish remote participants beyond "Others". Requires
          PyTorch or CoreML runtime decision. ~2 GB model download.
          Mutable attribution constraint already in place.
        depends_on: []
        files:
          - lib/audio_capture.py
          - src/api/session.py
          - src/api/transcript_store.py

      - id: F-302
        name: "Tier 3: Speaker enrollment + verification"
        status: backlog
        effort: XL
        description: >
          Pre-register voice profiles. Each speaker says a sentence at
          meeting start, extract embedding, store as named profile.
          Compare segments against enrolled profiles during meeting.
        depends_on: [F-301]
        files:
          - new: lib/speaker_enrollment.py
          - app/src/components/MeetingSetup.tsx

  # ─── WORKSTREAM 4: Packaging & Distribution ─────────────────────
  # Priority: V1 ship — gates on core experience being ready.
  # See context/packaging-strategy.md.

  packaging:
    name: "Packaging & Distribution"
    phase: V1
    description: >
      Native Mac app build pipeline, code signing, model bundling,
      App Store submission. Premature until core product experience
      is right. See context/packaging-strategy.md for model delivery tiers.

    features:
      - id: F-401
        name: "Tauri build pipeline"
        status: backlog
        effort: L
        description: >
          Production Tauri build: compile Rust shell, bundle Python
          backend (or replace with native inference), sign llama.cpp
          binary, produce .dmg for distribution.
        depends_on: []
        files:
          - app/src-tauri/

      - id: F-402
        name: "Model bundling + first-run experience"
        status: backlog
        effort: L
        description: >
          Bundle core model pack (~1.9 GB) in app. First-run should
          work immediately — no download step. Optional model packs
          downloadable from settings.
        depends_on: [F-401]
        files:
          - app/src-tauri/

      - id: F-403
        name: "Code signing + notarization"
        status: backlog
        effort: M
        description: >
          Apple Developer signing for app + llama.cpp binary.
          Notarization for Gatekeeper. Entitlements for microphone
          access and audio capture.
        depends_on: [F-401]

      - id: F-404
        name: "App Store submission"
        status: backlog
        effort: M
        description: >
          App Store listing, screenshots, privacy policy, review
          submission. Sandboxing compliance. BlackHole dependency
          documented in listing.
        depends_on: [F-401, F-402, F-403]

  # ─── WORKSTREAM 5: Encoder Intelligence Re-Architecture ──────────
  # Priority: V2 — the Liquid re-alignment. Replace heuristic/decoder
  # intelligence with a shared LFM2.5-Encoder backbone + tiny heads.
  # Strangler-fig behind existing interfaces. Full plan:
  # docs/architecture/liquid-rearchitecture.md

  encoder_intelligence:
    name: "Encoder Intelligence Re-Architecture"
    phase: V2
    description: >
      Re-align intelligence to output shape. Most triggers/extraction are
      classification tasks currently done by regex + a generic decoder; move
      them onto one shared LFM2.5-Encoder-350M backbone with distilled heads.
      Route-first hot/cold execution. Retrieval swaps to a Liquid retriever.
      Reversible, eval-gated. See docs/architecture/liquid-rearchitecture.md.

    features:
      - id: F-500
        name: "Decision spikes — a11y, encoder smoke, retrieval eval, VLM"
        status: done
        effort: M
        description: >
          Stage-0 spikes (results in docs/architecture/liquid-rearchitecture.md).
          Encoder: GREEN — clean load via AutoModelForMaskedLM/.lfm2, ~14ms/turn
          mean-pooled on MPS, 1024-dim. Retrieval: LFM2.5-Embedding-350M ties
          MiniLM exactly (safe swap; eval too coarse to prove better → F-509).
          a11y: near-dead-end for active-speaker (names/mute only) → demoted to
          L4 roster; Zoom Meeting SDK is the real L2 (local). VLM: INCONCLUSIVE,
          requires real images + real test (slide 4/5 on synthetic; active-speaker
          negative). Refactor-over-rewrite decision recorded in the ADR.
        depends_on: []
        files:
          - scripts/spike_encoder_smoke.py
          - scripts/spike_retrieval_eval.py
          - scripts/spike_vlm_active_speaker.py

      - id: F-509
        name: "Harden the retrieval eval (discriminating power)"
        status: done
        effort: M
        description: >
          Current eval saturates (doc-level, ~3 distinct docs) — it can't tell
          two retrievers apart (MiniLM and LFM2.5-Embedding tied to 3 decimals).
          Add chunk-level relevance labels, more/confusable docs, and query vs
          passage instruction prompts so the eval can prove an improvement, not
          just non-regression.
        depends_on: [F-502]
        files:
          - tests/eval/rag_eval_dataset.yaml
          - tests/eval/test_rag_eval.py

      - id: F-510
        name: "Frozen-encoder linear-probe heads (v1, no GPU/forge)"
        status: done
        effort: M
        description: >
          The v1 encoder head that needs NO training of the model: mean-pool the
          FROZEN LFM2.5-Encoder-350M → 1024-d, fit a logistic-regression probe on a
          labeled set (sklearn, seconds on CPU). Encoder-only (no causal), no forge,
          no GPU. Spike measured macro-F1 0.886 off-the-shelf on the 5-way trigger
          task (scripts/spike_encoder_linear_probe.py). Ships as the first
          non-heuristic Head behind the Head interface, wired as default ONLY if it
          beats the heuristic on a frozen held-out split (else stays off, numbers
          recorded). Decouples encoder intelligence from the forge bidirectional
          change; F-503/504/505 (forge-LoRA) become the measured upgrade over this.
        depends_on: [F-501]
        files:
          - new: lib/intelligence/heads/linear_probe.py
          - new: data/fixtures/trigger_probe_dataset.jsonl

      - id: F-501
        name: "EncoderIntelligenceLayer interface + typed turn-state"
        status: done
        effort: L
        description: >
          Introduce the EncoderIntelligenceLayer abstraction and a typed
          shared turn-state object (replaces loose routing in ConversationBuffer).
          Wire the encoder backbone (one mean-pooled forward per turn). Keep the
          existing heuristics as the FIRST head implementations behind the
          interface — zero behavior change, full test parity. Pure refactor.
        depends_on: [F-500]
        files:
          - new: lib/intelligence/encoder_layer.py
          - new: lib/intelligence/turn_state.py
          - lib/triggers/engine.py
          - lib/conversation/buffer.py

      - id: F-502
        name: "Retrieval swap — MiniLM → LFM2.5 retriever"
        status: done
        effort: M
        description: >
          Replace all-MiniLM-L6-v2 with LFM2.5-Embedding-350M (or ColBERT-350M
          for compositional queries) behind lib/rag/embedder.py. Must hold
          Hit@1 >= 94.4% / MRR >= 0.972 on tests/eval or it does not land.
          Requires downloading the retriever (not yet on disk).
        depends_on: [F-500]
        files:
          - lib/rag/embedder.py
          - tests/eval/

      - id: F-503
        name: "Trigger router head (forge-LoRA, v2 over F-510 probe)"
        status: done
        effort: L
        description: >
          DONE (session-018). Encoder-backed sequence classifier (mean-pool, CE)
          LoRA-trained via forge on a SHAPE-FIRST corpus (~30 unrelated domains so
          only pragmatic shape predicts the label). Bidirectional encoder variant
          (sequence_classifier_encoder) — never causal; forge encoder-classifier
          change landed 2026-07-20. Gated on REAL meeting-transcript turns, not just
          synthetic: hybrid (F-503 + heuristic question-rescue) macro-F1 0.846 vs
          probe 0.55 vs heuristic 0.26. Wired config-gated (f503_router_enabled),
          default OFF; promotion to live default gated on the WS-14 live call.
          Artifact: LFM2.5-TriggerRouter-350M in the model registry. See
          forge/f503-trigger-router/RESULTS.md.
        depends_on: [F-501, F-510]
        files:
          - new: lib/intelligence/heads/trigger_router.py
          - lib/triggers/engine.py
          - new: tests/test_trigger_router.py
          - new: tests/eval/f503_gate.py

      - id: F-504
        name: "Evidence span head (token-classifier)"
        status: backlog
        effort: L
        description: >
          Replace answer_extractor sentence heuristic with an encoder
          token-classifier (BIO) over per-token vectors. Its OWN LoRA — never
          co-trained with the sequence heads (co-training collapse risk).
        depends_on: [F-501]
        files:
          - new: lib/intelligence/heads/evidence_span.py
          - lib/answer_extractor.py

      - id: F-505
        name: "Quality / rhetorical gate head"
        status: backlog
        effort: M
        description: >
          Fold F-201 rhetorical suppression + fuzzy noise filtering into an
          encoder multi-label gate. Keep O(1)-checkable filters (repeated chars,
          literal watch-words) deterministic in code.
        depends_on: [F-501]
        files:
          - new: lib/intelligence/heads/quality_gate.py
          - lib/filters.py

      - id: F-506
        name: "Route-first hot/cold execution + shared-state"
        status: done
        effort: M
        description: >
          Wire the heads as a route-first gate: hot path answers/suppresses from
          heads (~50 ms); cold path runs retrieval + generation only when a head
          fires. Stop running every trigger every turn. Operate on shared
          turn-state, not a daisy-chain.
        depends_on: [F-503, F-505]
        files:
          - lib/triggers/engine.py
          - lib/intelligence/encoder_layer.py

      - id: F-507
        name: "Structured notes via LFM2.5-350M-Extract"
        status: in_progress
        effort: M
        description: >
          Point notes_generator at LFM2.5-350M-Extract (structured extraction)
          instead of hand-prompting the instruct model for typed fields.
        depends_on: []
        files:
          - src/api/notes_generator.py

      - id: F-508
        name: "Persistent warm-model runtime + contention mgmt"
        status: in_progress
        effort: L
        description: >
          Replace subprocess.run()-per-call inference with a persistent runtime
          (llama.cpp server / LEAP) keeping models warm — real-time target needs
          no cold spawn, and a KV/state story. Manage which of ASR / encoder /
          VL / instruct are resident when (VL-450M light path vs 1.6B slides).
        depends_on: [F-501]
        files:
          - lib/lfm2_wrapper.py

  # ─── WORKSTREAM 6: Visual & Attribution Awareness ────────────────
  # Priority: V2 — supersedes the acoustic-first parts of WORKSTREAM 3.
  # Attribution hierarchy: channel > platform metadata > vision > acoustic.
  # Full plan: docs/architecture/liquid-rearchitecture.md

  awareness:
    name: "Visual & Attribution Awareness"
    phase: V2
    description: >
      Re-order speaker attribution to a hierarchy of truth: channel source
      (ground truth) > platform active-speaker (a11y / VLM, with real names) >
      acoustic diarization (fallback) > roster/enrollment. Add a visual context
      sensor (LFM2.5-VL) that reads the shared screen into RAG. Detect the
      meeting regime and degrade honestly in conference rooms.

    features:
      - id: F-601
        name: "AttributionResolver — hierarchy + regime detection"
        status: done
        effort: M
        description: >
          Pluggable resolver that composes the attribution layers by confidence,
          with L1 channel routing as the deterministic base. Regime detection
          (solo-endpoint vs conference-room) drives honest degradation instead
          of confidently-wrong labels. Refactors the current Tier-1/Tier-2 split.
        depends_on: []
        files:
          - new: lib/attribution/resolver.py
          - src/api/session.py

      - id: F-602
        name: "a11y roster-name reader (L4 enrichment)"
        status: backlog
        effort: S
        description: >
          RESCOPED per F-500: a11y exposes participant NAMES and own-mute state,
          NOT a queryable active-speaker. Read the roster from the meeting
          window's accessibility tree to name L3 acoustic clusters (L4). Active-
          speaker is NOT an a11y capability — do not attempt it here.
        depends_on: [F-500, F-601]
        files:
          - new: lib/attribution/accessibility.py

      - id: F-603
        name: "VisualContextCapture — LFM2.5-VL-Extract (slides→RAG + roster)"
        status: backlog
        effort: L
        description: >
          GATED on a real-image test first (real speaker-view + real shared-slide
          screenshots) — Stage-0 VLM finding is INCONCLUSIVE on synthetic images.
          Scope: debounced screen capture; shared-screen / slide-deck read into
          the RAG context (the killer feature for customer calls) + roster
          extraction. Uses VL-Extract with a YAML field schema (prompt-sensitive).
          NOT an active-speaker locator — Stage-0 signal there is negative.
        depends_on: [F-500, F-601]
        files:
          - new: lib/attribution/visual_context.py
          - lib/rag_engine.py

      - id: F-604
        name: "Acoustic diarization fix — segment + roster-bound"
        status: done
        effort: L
        description: >
          Rework Tier-2 (F-301): segment at speaker-change points (not silence
          turns), embed homogeneous slices, cluster with re-assignment bounded to
          the known roster size. Fallback only — used when L2/L2' unavailable.
        depends_on: [F-601]
        files:
          - lib/diarization.py

      - id: F-605
        name: "Voice enrollment for known colleagues"
        status: done
        effort: L
        description: >
          Rework of F-302: pre-register frequent colleagues' voice profiles so
          acoustic clusters map to real names. Highest-leverage add for the
          conference-room regime.
        depends_on: [F-604]
        files:
          - new: lib/speaker_enrollment.py
          - app/src/components/MeetingSetup.tsx

      - id: F-606
        name: "Conference-room regime — honest degradation"
        status: done
        effort: S
        description: >
          Detect the shared-far-field-mic regime and degrade to a single
          "Others (room)" bucket or clearly-flagged low-confidence Speaker N,
          rather than emitting confidently-wrong names. Surface confidence in UI.
        depends_on: [F-601]
        files:
          - lib/attribution/resolver.py
          - app/src/components/TranscriptPane.tsx

      - id: F-607
        name: "Lexical speaker-consistency pass (LFM)"
        status: done
        effort: M
        description: >
          Cheap post-hoc LFM pass over (attribution hypothesis + transcript) to
          catch turn-taking contradictions and named cues ("thanks, Priya").
          Correction layer on top of attribution, not the mechanism.
        depends_on: [F-601]
        files:
          - new: lib/attribution/lexical_consistency.py

      - id: F-608
        name: "Zoom high-fidelity mode — Meeting SDK (L2)"
        status: backlog
        effort: XL
        description: >
          Follow-on high-fidelity path (per Stage-0 research): Zoom Meeting SDK on
          the host's machine — onUserActiveAudioChange for ground-truth active
          speaker + onOneWayAudioRawDataReceived for per-participant PCM (makes
          diarization trivial). Local, host/co-host perm, no cloud. Zoom-only;
          Teams/Meet fall back to the acoustic + a11y path. Optional mode, not a
          baseline dependency.
        depends_on: [F-601]
        files:
          - new: lib/attribution/zoom_sdk.py

  # ─── WORKSTREAM 8: Corpus Preparation ────────────────────────────
  # Priority: V1.5 — productizes the lab work. Retrieval-first means the
  # corpus IS the product (ADR: D-08); this makes any user's content
  # meeting-ready and tells them, honestly, if it can answer their meetings.
  # Prototyped end-to-end in scripts/lab/. See docs/architecture/
  # corpus-prep-onboarding-spec.md and ADR-001-local-corpus-distiller.md.

  corpus_prep:
    name: "Corpus Preparation (Prepare-corpus flow)"
    phase: V1.5
    description: >
      Bring-your-own-knowledge → distill into borrowable answer-units →
      readiness score → ready for calls. One-time, on-device prep. The
      distiller and coverage/judge instrument are prototyped in scripts/lab/.

    features:
      - id: F-701
        name: "Corpus distiller (reshape docs → grounded answer-units)"
        status: done  # 2026-07-22: lib/corpus/{text,distiller,cloud}.py; local model backend tracked as F-702
        effort: L
        description: >
          Walk a source doc section-by-section and emit self-contained, grounded
          answer-units with a provenance pointer. Consolidated mode (one complete
          answer per section) + reads tables. Prototyped in scripts/lab/distiller.py
          (cloud + heuristic); productize into lib/corpus/ with a local backend.
        depends_on: []
        files:
          - scripts/lab/distiller.py
          - new: lib/corpus/distiller.py
      - id: F-702
        name: "Local distiller model (on-device, no cloud egress)"
        status: backlog
        effort: XL
        description: >
          Forge a local small model for the section → grounded-answer-unit task
          (incl. table reading), bootstrapped from cloud-distilled training data.
          Ships as the default distiller; cloud stays offline-validation only.
          See ADR-001.
        depends_on: [F-701]
        files:
          - new: lib/corpus/distiller.py
      - id: F-703
        name: "Corpus readiness score (fit-for-purpose gate)"
        status: done  # 2026-07-22: lib/corpus/readiness.py (local rater + multi-unit) + POST /corpus/readiness; judge calibration pending operator key
        effort: M
        description: >
          Run likely questions through the corpus, score each retrieved answer
          (borrowable/partial/gap), show a fit-for-purpose % + gap list before the
          user relies on it live. Prototyped: scripts/lab/pipeline.py coverage +
          judge.py + calibration. Productize (local judge or heuristic proxy).
        depends_on: [F-701]
        files:
          - scripts/lab/pipeline.py
          - scripts/lab/judge.py
          - new: lib/corpus/readiness.py
      - id: F-704
        name: "'Prepare corpus' onboarding wizard (Tauri)"
        status: backlog
        effort: L
        description: >
          Add sources (folder/upload/Notion) → distill (progress) → readiness
          score + gap list → ready. Extends MeetingSetup / a Corpus manager screen.
        depends_on: [F-701, F-703]
        files:
          - new: app/src/components/CorpusPrep.tsx
          - src/api/routes/context.py
      - id: F-705
        name: "Retrieval-first live borrowable view"
        status: backlog
        effort: M
        description: >
          Live: retrieve the borrowable answer-unit + source, glanceable,
          user-gated (D-02). No live generation. ~120-190ms. Prototyped as the
          lab borrowable cards.
        depends_on: [F-701]
        files:
          - app/src/components/PromptsPane.tsx
          - lib/answer_extractor.py
      - id: F-706
        name: "Incremental re-distill on doc change"
        status: backlog
        effort: S
        description: >
          Re-distill only changed documents when the corpus updates, keeping the
          answer-unit index fresh without a full rebuild.
        depends_on: [F-701]
        files:
          - new: lib/corpus/distiller.py
