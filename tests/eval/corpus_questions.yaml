# Readiness question set — on-device-capability-playbook corpus (T4 / F-703).
#
# ~20 realistic meeting questions a listener could ask about this corpus.
# INDEPENDENCE RULE (execution-prompt constraint 3): this set is the held-out
# acceptance instrument for distillation/readiness. The distiller must never be
# tuned against these specific questions — coverage here has to reflect a real
# corpus, not a gamed one.
#
# kind: single   = answer lives in one section
#       table    = answer lives in (or partly in) a markdown table
#       compound = answer spans multiple sections (the INT4-class failure mode)
# sections: where a complete answer lives in the source doc (for gap analysis).

corpus: on-device-capability-playbook
questions:
  - id: Q01
    text: "How much does INT4 quantization hurt accuracy, and where does it degrade most?"
    kind: compound
    sections: ["1.3", "1.9"]
  - id: Q02
    text: "What are the three levels of distillation and when do we use each?"
    kind: table
    sections: ["2.4"]
  - id: Q03
    text: "Is speculative decoding lossless, and how much speedup does it give?"
    kind: compound
    sections: ["5.5", "5.4"]
  - id: Q04
    text: "When should we prune versus quantize — do they stack?"
    kind: table
    sections: ["3.6"]
  - id: Q05
    text: "Why does extreme quantization like ternary need training instead of post-training rounding?"
    kind: single
    sections: ["1.7"]
  - id: Q06
    text: "What do GPTQ and AWQ do differently from plain INT4 rounding?"
    kind: single
    sections: ["1.4"]
  - id: Q07
